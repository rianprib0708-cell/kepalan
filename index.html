<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Gesture Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #ui-info {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.7); color: white; padding: 15px;
            border-radius: 12px; font-size: 13px; pointer-events: none;
            border: 1px solid rgba(0, 251, 255, 0.3);
            line-height: 1.6;
        }
        #webcam { 
            position: absolute; bottom: 10px; right: 10px; 
            width: 130px; border-radius: 10px; transform: scaleX(-1);
            border: 2px solid #00fbff;
        }
        .status { color: #00fbff; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui-info">
        <b style="font-size: 16px; color: #00fbff;">Interactive Particles Pro</b><br>
        🔄 Geser Tangan: <span class="status">Putar Partikel</span><br>
        🖐️ Buka Tangan: <span class="status">Dispersion</span><br>
        🫰 Finger Heart: <span class="status">Hati ✨</span><br>
        ✌️ Peace Sign: <span class="status">Teks "I LOVE U"</span>
    </div>

    <video id="webcam" autoplay playsinline></video>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, particles, material;
        let particleCount = 15000; 
        let currentShape = 'sphere';
        let handOpenness = 0;
        let targetRotationY = 0;
        let lastHandX = 0.5;
        const videoElement = document.getElementById('webcam');

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 6;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            createParticles();
            setupHandTracking();
            animate();
        }

        // Fungsi pembantu membuat huruf untuk "I LOVE U"
        function getLetterPos(index, total, letter) {
            let x = 0, y = (Math.random() - 0.5) * 2;
            const t = Math.random() * Math.PI * 2;
            
            switch(letter) {
                case 'I': x = -3; break;
                case 'L': 
                    x = -1.5; 
                    if(Math.random() > 0.6) { x = -1.5 + Math.random(); y = -1; } 
                    break;
                case 'O': x = 0 + Math.cos(t) * 0.7; y = Math.sin(t) * 1; break;
                case 'V': x = 1.5 + (Math.random()-0.5); y = (x-1.5)*2 * (Math.random() > 0.5 ? 1 : -1); break;
                case 'E': 
                    x = 3; 
                    if(Math.random() > 0.5) { x = 3 + Math.random(); y = Math.random() > 0.5 ? 1 : (Math.random() > 0.5 ? 0 : -1); }
                    break;
                case 'U': x = 4.5 + Math.cos(t + Math.PI) * 0.7; y = Math.sin(t + Math.PI) * 1; if(y < 0) y = -y; break;
            }
            return { x: x * 0.7, y: y * 0.7 }; // Skala diperkecil
        }

        function createParticles() {
            const geometry = new THREE.BufferGeometry();
            const posArray = new Float32Array(particleCount * 3);
            const sphereTarget = new Float32Array(particleCount * 3);
            const heartTarget = new Float32Array(particleCount * 3);
            const textTarget = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                // Sphere
                const phi = Math.acos(-1 + (2 * i) / particleCount);
                const theta = Math.sqrt(particleCount * Math.PI) * phi;
                sphereTarget[i*3] = 2.5 * Math.cos(theta) * Math.sin(phi);
                sphereTarget[i*3+1] = 2.5 * Math.sin(theta) * Math.sin(phi);
                sphereTarget[i*3+2] = 2.5 * Math.cos(phi);

                // Heart (🫰)
                const t = Math.random() * Math.PI * 2;
                const hx = 16 * Math.pow(Math.sin(t), 3);
                const hy = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                heartTarget[i*3] = hx * 0.18;
                heartTarget[i*3+1] = hy * 0.18;
                heartTarget[i*3+2] = (Math.random() - 0.5) * 1;

                // I LOVE U (✌️)
                const letters = ['I', 'L', 'O', 'V', 'E', 'U'];
                const lTarget = getLetterPos(i, particleCount, letters[i % 6]);
                textTarget[i*3] = lTarget.x;
                textTarget[i*3+1] = lTarget.y;
                textTarget[i*3+2] = (Math.random() - 0.5) * 0.5;

                posArray[i*3] = sphereTarget[i*3];
                posArray[i*3+1] = sphereTarget[i*3+1];
                posArray[i*3+2] = sphereTarget[i*3+2];
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            geometry.setAttribute('targetSphere', new THREE.BufferAttribute(sphereTarget, 3));
            geometry.setAttribute('targetHeart', new THREE.BufferAttribute(heartTarget, 3));
            geometry.setAttribute('targetText', new THREE.BufferAttribute(textTarget, 3));

            material = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uExpand: { value: 0 },
                    uShapeType: { value: 0.0 }
                },
                vertexShader: `
                    uniform float uExpand;
                    uniform float uShapeType;
                    attribute vec3 targetSphere;
                    attribute vec3 targetHeart;
                    attribute vec3 targetText;
                    void main() {
                        vec3 target;
                        if(uShapeType < 0.5) target = targetSphere;
                        else if(uShapeType < 1.5) target = targetHeart;
                        else target = targetText;

                        vec3 pos = target + (target * uExpand * 2.5);
                        gl_PointSize = 2.0;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                    }
                `,
                fragmentShader: `
                    void main() {
                        gl_FragColor = vec4(0.0, 0.98, 1.0, 1.0);
                    }
                `
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        function setupHandTracking() {
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

            hands.onResults((res) => {
                if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                    const lm = res.multiHandLandmarks[0];
                    
                    // 1. Logika Rotasi Mengikuti Tangan (X axis)
                    let currentHandX = lm[9].x; // Ambil posisi tengah telapak
                    let diffX = currentHandX - lastHandX;
                    targetRotationY += diffX * 5; // Mengatur sensitivitas putaran
                    lastHandX = currentHandX;

                    // 2. Deteksi Gestur Finger Heart (🫰) yang lebih peka
                    const distThumbIndex = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
                    const isMiddleDown = lm[12].y > lm[10].y;
                    const isRingDown = lm[16].y > lm[14].y;

                    // 3. Deteksi Peace (✌️)
                    const isIndexUp = lm[8].y < lm[6].y;
                    const isMiddleUp = lm[12].y < lm[10].y;

                    if (isIndexUp && isMiddleUp && isRingDown) {
                        currentShape = 'text'; // ✌️
                    } else if (distThumbIndex < 0.04 && isMiddleDown) {
                        currentShape = 'heart'; // 🫰
                    } else {
                        currentShape = 'sphere'; 
                    }

                    const distExpand = Math.hypot(lm[8].x - lm[0].x, lm[8].y - lm[0].y);
                    handOpenness = THREE.MathUtils.lerp(handOpenness, Math.max(0, (distExpand - 0.3) * 3), 0.1);
                }
            });

            const cam = new Camera(videoElement, {
                onFrame: async () => { await hands.send({ image: videoElement }); },
                width: 640, height: 480
            });
            cam.start();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(material) {
                material.uniforms.uExpand.value = handOpenness;
                let targetType = currentShape === 'sphere' ? 0.0 : (currentShape === 'heart' ? 1.0 : 2.0);
                material.uniforms.uShapeType.value = THREE.MathUtils.lerp(material.uniforms.uShapeType.value, targetType, 0.08);
                
                // Rotasi halus mengikuti target dari gerakan tangan
                particles.rotation.y = THREE.MathUtils.lerp(particles.rotation.y, targetRotationY, 0.1);
                // Tambahkan rotasi otomatis sedikit agar tetap hidup
                particles.rotation.y += 0.002;
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
```
